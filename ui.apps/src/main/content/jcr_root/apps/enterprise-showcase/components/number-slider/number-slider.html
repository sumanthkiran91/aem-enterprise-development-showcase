<div class="cmp-number-slider" data-cmp-is="number-slider" data-original-value="${properties.originalValue}">
    <label>${properties.label}</label>
    <input type="range" min="${properties.min}" max="${properties.max}" value="${properties.originalValue}" />
    <button class="cmp-number-slider__reset" hidden>Reset to original estimate</button>
</div>
