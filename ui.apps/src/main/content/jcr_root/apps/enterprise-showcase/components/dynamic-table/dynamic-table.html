<sly data-sly-use.model="com.example.aem.portfolio.core.models.DynamicTableModel" />
<table class="cmp-dynamic-table">
    <caption data-sly-test="${properties.caption}">${properties.caption}</caption>
    <tbody>
        <tr data-sly-repeat.row="${model.rows}">
            <td>${row.valueMap.label}</td>
            <td>${row.valueMap.value}</td>
            <td data-sly-test="${row.valueMap.status}">${row.valueMap.status}</td>
        </tr>
    </tbody>
</table>
